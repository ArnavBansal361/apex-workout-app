<defs>
  <style>
    .muscle-chest, .muscle-shoulders, .muscle-back,
    .muscle-arms, .muscle-core, .muscle-legs {
      fill: rgba(255,255,255,0.06);
      stroke: rgba(255,255,255,0.2);
      stroke-width: 0.8;
      transition: fill 0.25s ease, stroke 0.25s ease, filter 0.25s ease;
    }
    .muscle-chest.active, .muscle-shoulders.active, .muscle-back.active,
    .muscle-arms.active, .muscle-core.active, .muscle-legs.active {
      fill: rgba(99,153,220,0.55);
      stroke: rgba(140,190,255,1);
